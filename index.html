<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, color=#F7B7C8,">
    <title>Buat Iza</title>
    <meta property="og:type" content="website">
    <meta property="og:title" content="Buat Iza">
    <meta property="og:description" content="Buka Suratnyaa Plissss. Kalo gak dibuka aku sedih, huhu.">
    <meta property="og:image" content="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">
    <meta property="og:url" content="https://setyosanang.github.io/haiizaa/">
    <link rel="manifest" href="manifest.json">

    <link rel="icon" type="image/png" href="https://setyosanang.github.io/haiizaa/data/img/Favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/animation.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

    <div class="bg-layer" id="bg-layer"></div>
    <div class="doodle-layer" id="doodle-layer"></div>

    <header class="app-header">
        <div>
            <div class="title" id="header-title">Buat Iza</div>
            <div class="subtitle" id="header-subtitle">A Small Interactive Letter</div>
        </div>
        <button class="music-toggle" id="music-toggle" aria-label="Matikan musik">🎵</button>
    </header>

    <main>
        <div class="story-card" id="story-card">
            <div class="card-doodle-layer" id="card-doodle-layer" aria-hidden="true"></div>

            <img class="story-image" id="story-image" alt="" hidden>

            <div class="music-player" id="music-player" hidden>
                <div class="music-title" id="music-title">Judul Lagu</div>
                <div class="music-bar-row">
                    <button class="music-play-btn" id="music-play-btn" type="button" aria-label="Putar musik">▶</button>
                    <div class="music-progress" id="music-progress">
                        <div class="music-progress-fill" id="music-progress-fill"></div>
                        <div class="music-progress-thumb" id="music-progress-thumb"></div>
                    </div>
                    <span class="music-time" id="music-time">00:00</span>
                </div>
            </div>

            <div class="story-subtitle" id="story-subtitle"></div>
            <h1 class="story-title" id="story-title"></h1>
            <p class="story-desc" id="story-desc"></p>
        </div>

        <nav class="navigator" id="navigator" aria-label="Halaman"></nav>
    </main>

    <footer class="app-footer">
        <p>Interactive Story Engine.</p>
    </footer>

    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
